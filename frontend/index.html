<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GM Stream + TTS</title>
  <style>
    body { font-family: system-ui, Arial; margin: 20px; }
    #log { white-space: pre-wrap; background:#f6f6f6;padding:12px;border-radius:6px;height:320px;overflow:auto; }
    textarea { width:100%; height:120px; }
    button { margin-top:8px; }
  </style>
</head>
<body>
  <h2>GM Stream + TTS</h2>
  <textarea id="history" placeholder="Line 1\nLine 2"></textarea>
  <div>
    <label>Voice:
      <select id="voice">
        <option value="">(loading voices...)</option>
      </select>
    </label>
    <label>Target words: <input id="target" value="800" size="6" /></label>
    <label>Recent N: <input id="recent_n" value="5" size="4" /></label>
  </div>
  <button id="start">Start</button>
  <button id="stop">Stop</button>

  <h3>Output</h3>
  <div id="log"></div>

  <script>
  console.log("Frontend loaded. Fetching available voices...");

  const startBtn = document.getElementById("start");
  const stopBtn = document.getElementById("stop");
  const logEl = document.getElementById("log");
  const voiceSelect = document.getElementById("voice");
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  let ws = null;
  let scheduledUntil = audioCtx.currentTime;

  function log(msg) {
    console.log(msg);
    logEl.textContent += msg + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  }

  function scheduleDecodedAudio(arrayBuffer) {
    audioCtx.decodeAudioData(arrayBuffer.slice(0), (decoded) => {
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      const startAt = Math.max(now + 0.05, scheduledUntil + 0.01);
      src.start(startAt);
      scheduledUntil = startAt + decoded.duration;
    }, (err) => {
      console.error("decode error", err);
      log("Audio decode error: " + err);
    });
  }

  // Fetch voices and populate select
  async function loadVoices() {
    try {
      const res = await fetch("/api/voices");
      if (!res.ok) throw new Error("voices fetch failed: " + res.status);
      const payload = await res.json();
      const voices = payload.voices || [];
      voiceSelect.innerHTML = "";
      voices.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v.name;
        opt.textContent = `${v.name} — ${v.language_codes.join(", ")}` + (v.ssml_gender ? ` (${v.ssml_gender})` : "");
        voiceSelect.appendChild(opt);
      });
      // Try to preselect a common Wavenet voice if present
      const prefer = "en-US-Wavenet-D";
      const found = Array.from(voiceSelect.options).find(o => o.value === prefer);
      if (found) found.selected = true;
    } catch (e) {
      console.error("loadVoices failed", e);
      voiceSelect.innerHTML = '<option value="en-US-Wavenet-D">en-US-Wavenet-D (fallback)</option>';
    }
  }

  loadVoices();

  startBtn.addEventListener("click", async () => {
    if (ws) { log("Already running"); return; }
    const historyText = document.getElementById("history").value.trim();
    if (!historyText) { alert("Paste history lines"); return; }
    const history = historyText.split("\n").map(s => s.trim()).filter(Boolean);
    const voice = voiceSelect.value || "en-US-Wavenet-D";
    const target = parseInt(document.getElementById("target").value || "800");
    const recent_n = parseInt(document.getElementById("recent_n").value || "5");

    const wsUrl = (location.origin.replace(/^http/, 'ws')) + "/ws/gm";
    log("Opening WS: " + wsUrl);
    ws = new WebSocket(wsUrl);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      log("WS open");
      ws.send(JSON.stringify({ type: "start", history, voice_name: voice, target_words: target, recent_n }));
    };

    ws.onmessage = async (ev) => {
      if (typeof ev.data === "string") {
        try {
          const data = JSON.parse(ev.data);
          if (data.type === "memory_summary") { log("[Memory Summary]\n" + data.summary); }
          else if (data.type === "text_fragment") { log("[Text] " + data.fragment); }
          else if (data.type === "done") { log("== done =="); }
          else if (data.type === "error") { log("[ERROR] " + data.message); }
          else { log("[MSG] " + ev.data); }
        } catch(e) { console.error("parse", e, ev.data); log("parse error: " + e); }
        return;
      }

      // Binary frame: first 4 bytes = big-endian length of meta (JSON)
      const arrBuf = ev.data;
      const view = new DataView(arrBuf);
      const metaLen = view.getUint32(0, false);
      const metaBytes = arrBuf.slice(4, 4 + metaLen);
      let meta = {};
      try {
        const s = new TextDecoder().decode(metaBytes);
        meta = JSON.parse(s);
      } catch (e) {
        console.error("meta decode error", e);
        log("meta decode error: " + e);
      }
      const audioStart = 4 + metaLen;
      const audioBytes = arrBuf.slice(audioStart);
      log(`[Audio] id=${meta.id || 'unk'} size=${audioBytes.byteLength} enc=${meta.encoding || '?'}`);
      scheduleDecodedAudio(audioBytes);
    };

    ws.onclose = (c) => { log("WS closed: " + JSON.stringify({code:c.code,reason:c.reason,wasClean:c.wasClean})); ws = null; };
    ws.onerror = (e) => { console.error("ws err", e); log("WS error (check console)"); };
  });

  stopBtn.addEventListener("click", () => {
    if (ws) { ws.close(); ws = null; }
  });
  </script>
</body>
</html>
