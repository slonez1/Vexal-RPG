
# cloudbuild.yaml
# Builds Docker image from backend/ and deploys to Cloud Run.
# Substitutions allow you to change region/service/account/bucket at trigger time.
steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA', './backend']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - '${_SERVICE_NAME}'
    - '--image'
    - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
    - '--region'
    - '${_REGION}'
    - '--platform'
    - 'managed'
    - '--service-account'
    - '${_SERVICE_ACCOUNT}'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'GCS_BUCKET=${_GCS_BUCKET},USE_GCS_CACHE=${_USE_GCS_CACHE},OPENAI_CHAT_MODEL=${_OPENAI_CHAT_MODEL}'
    - '--set-secrets'
    - 'OPENAI_API_KEY=projects/$PROJECT_ID/secrets/OPENAI_API_KEY:latest'

images:
- 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'

substitutions:
  _REGION: "us-central1"
  _SERVICE_NAME: "gm-tts"
  # Use the full email of the service account you created for Cloud Run:
  # e.g. gm-tts-run-sa@your-project-id.iam.gserviceaccount.com
  _SERVICE_ACCOUNT: "gm-tts-run-sa@$PROJECT_ID.iam.gserviceaccount.com"
  _GCS_BUCKET: "your-audio-cache-bucket"
  _USE_GCS_CACHE: "true"
  _OPENAI_CHAT_MODEL: "gpt-4o-mini"

timeout: "1200s"
