options:
  logging: CLOUD_LOGGING_ONLY

steps:
# Debug: list workspace and show whether frontend/fontend exists
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "=== WORKSPACE ROOT ==="
      ls -la
      echo
      echo "=== check frontend ==="
      if [ -d "frontend" ]; then
        echo "FOUND frontend:"
        ls -la frontend
      else
        echo "frontend directory NOT found"
      fi
      echo
      echo "=== check fontend (possible misspelling) ==="
      if [ -d "fontend" ]; then
        echo "FOUND fontend:"
        ls -la fontend
      else
        echo "fontend directory NOT found"
      fi
      echo
      echo "=== .dockerignore (if present) ==="
      if [ -f ".dockerignore" ]; then cat .dockerignore; else echo ".dockerignore not present"; fi
      echo
      echo "=== end debug ==="

# Ensure frontend is available inside backend path as a fallback
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "Copying frontend/fontend -> backend/frontend (if present)"
      rm -rf backend/frontend || true
      if [ -d "frontend" ]; then
        cp -r frontend backend/frontend
        echo "Copied frontend -> backend/frontend"
        ls -la backend/frontend
      elif [ -d "fontend" ]; then
        cp -r fontend backend/frontend
        echo "Copied fontend -> backend/frontend (handled misspelling)"
        ls -la backend/frontend
      else
        echo "Neither frontend nor fontend present, skipping copy"
      fi

# Build image using repo root as context and backend/Dockerfile
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - '${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA'
    - '-f'
    - './backend/Dockerfile'
    - '.'

- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - '${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA'

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'run'
    - 'deploy'
    - '${_SERVICE_NAME}'
    - '--image'
    - '${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA'
    - '--region'
    - '${_REGION}'
    - '--platform'
    - 'managed'
    - '--service-account'
    - 'gm-tts-run-sa@amara1-481702.iam.gserviceaccount.com'
    - '--allow-unauthenticated'
    - '--set-env-vars'
    - 'GCS_BUCKET=${_GCS_BUCKET},USE_GCS_CACHE=${_USE_GCS_CACHE},OPENAI_CHAT_MODEL=${_OPENAI_CHAT_MODEL}'
    - '--set-secrets'
    - 'OPENAI_API_KEY=OPENAI_API_KEY:latest'

images:
- '${_AR_LOCATION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA'

substitutions:
  _REGION: "us-central1"
  _SERVICE_NAME: "gm-tts"
  _AR_LOCATION: "us-central1"
  _AR_REPO: "gm-tts-repo"
  _GCS_BUCKET: "your-audio-cache-bucket"
  _USE_GCS_CACHE: "true"
  _OPENAI_CHAT_MODEL: "gpt-4o-mini"

timeout: "1200s"
